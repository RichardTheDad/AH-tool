app = "azerothflip-backend"
primary_region = "dfw"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8000"

# Restart the main process automatically if it exits (including OOM kills).
# Without this, Fly waits 20+ minutes before the VM is recycled.
[[restart]]
  policy = "always"
  max_retries = 5

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
