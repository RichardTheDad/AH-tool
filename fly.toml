app = "azerothflip-backend"
primary_region = "dfw"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8000"
  AZEROTHFLIPLOCAL_CORS_ORIGINS = "[\"http://127.0.0.1:5173\",\"http://localhost:5173\",\"https://ah-tool-bice.vercel.app\"]"
  AZEROTHFLIPLOCAL_CORS_ORIGIN_REGEX = "https://ah-tool-bice(?:-[a-z0-9-]+)?\\.vercel\\.app"
  AZEROTHFLIPLOCAL_RESTRICT_HEALTH_DIAGNOSTICS = "true"
  AZEROTHFLIPLOCAL_DB_POOL_SIZE = "5"
  AZEROTHFLIPLOCAL_DB_MAX_OVERFLOW = "1"
  AZEROTHFLIPLOCAL_DB_POOL_TIMEOUT_SECONDS = "10"
  AZEROTHFLIPLOCAL_DB_POOL_RECYCLE_SECONDS = "1200"
  AZEROTHFLIPLOCAL_DB_STATEMENT_TIMEOUT_MS = "15000"

# Restart the main process automatically if it exits (including OOM kills).
# Without this, Fly waits 20+ minutes before the VM is recycled.
[[restart]]
  policy = "always"
  max_retries = 5

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health/live"
    timeout = "10s"

[[checks]]
  name = "readiness"
  type = "http"
  port = 8000
  interval = "1m"
  timeout = "10s"
  grace_period = "45s"
  method = "GET"
  path = "/health/ready"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
